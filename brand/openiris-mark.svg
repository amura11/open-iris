<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img">
    <title>OpenIRis</title>
    <desc>Iris/aperture mark for OpenIRis — outer ring with eight tick marks and a gold center dot</desc>

    <!-- outer ring -->
    <circle cx="100" cy="100" r="80" fill="none" stroke="#5c3d8f" stroke-width="5"/>
    <!-- pupil -->
    <circle cx="100" cy="100" r="30" fill="#5c3d8f"/>

    <!-- cardinal tick marks (primary) -->
    <line x1="100" y1="20"  x2="100" y2="44"  stroke="#5c3d8f" stroke-width="5"/>
    <line x1="100" y1="156" x2="100" y2="180" stroke="#5c3d8f" stroke-width="5"/>
    <line x1="20"  y1="100" x2="44"  y2="100" stroke="#5c3d8f" stroke-width="5"/>
    <line x1="156" y1="100" x2="180" y2="100" stroke="#5c3d8f" stroke-width="5"/>

    <!-- diagonal tick marks (secondary) — at 45°, r≈80 outer to r≈60 inner -->
    <line x1="43"  y1="43"  x2="57"  y2="57"  stroke="#7b52b8" stroke-width="4"/>
    <line x1="157" y1="43"  x2="143" y2="57"  stroke="#7b52b8" stroke-width="4"/>
    <line x1="157" y1="157" x2="143" y2="143" stroke="#7b52b8" stroke-width="4"/>
    <line x1="43"  y1="157" x2="57"  y2="143" stroke="#7b52b8" stroke-width="4"/>

    <!-- gold stamen center dot (IR emitter) -->
    <circle cx="100" cy="100" r="10" fill="#c9a833" opacity="0.9"/>
</svg>
