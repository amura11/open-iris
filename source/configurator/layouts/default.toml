name = "Default Remote"

svg = """
<svg width="200" viewBox="0 0 680 1180" role="img" xmlns="http://www.w3.org/2000/svg">

  <!-- Remote body -->
  <rect x="215" y="10" width="250" height="1160" rx="32" ry="32"
        fill="#252525" stroke="#3a3a3a" stroke-width="1.5"/>

  <!-- Screen -->
  <rect id="screen" x="235" y="30" width="210" height="340" rx="4" ry="4"
        fill="#111" stroke="#4a4a4a" stroke-width="1" style="cursor:pointer"/>
  <text x="340" y="202" text-anchor="middle" fill="#444" font-size="11" font-family="sans-serif">screen</text>

  <!-- Screen nav (decorative, non-programmable) -->
  <rect x="245" y="388" width="54" height="30" rx="6" ry="6" fill="#2e2e2e" stroke="#555" stroke-width="1"/>
  <text x="272" y="407" text-anchor="middle" fill="#999" font-size="10" font-family="sans-serif">back</text>
  <circle cx="340" cy="403" r="20" fill="#333" stroke="#666" stroke-width="1.2"/>
  <circle cx="340" cy="403" r="8" fill="#2a2a2a" stroke="#888" stroke-width="0.8"/>
  <rect x="381" y="388" width="54" height="30" rx="6" ry="6" fill="#2e2e2e" stroke="#555" stroke-width="1"/>
  <text x="408" y="407" text-anchor="middle" fill="#999" font-size="10" font-family="sans-serif">home</text>
  <text x="340" y="436" text-anchor="middle" fill="#383838" font-size="9" font-family="sans-serif">── screen nav ──</text>

  <!-- Power -->
  <circle id="btn-power" cx="258" cy="484" r="16" fill="#2e2e2e" stroke="#555" stroke-width="1" style="cursor:pointer"/>
  <path d="M258,474 L258,479" stroke="#a44" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M252,477 A9,9 0 1 0 264,477" stroke="#a44" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <text x="258" y="510" text-anchor="middle" fill="#666" font-size="9" font-family="sans-serif">power</text>

  <!-- Source -->
  <circle id="btn-source" cx="422" cy="484" r="16" fill="#2e2e2e" stroke="#555" stroke-width="1" style="cursor:pointer"/>
  <circle cx="422" cy="484" r="4" fill="#777"/>
  <text x="422" y="510" text-anchor="middle" fill="#666" font-size="9" font-family="sans-serif">source</text>

  <!-- D-pad ring -->
  <circle cx="340" cy="554" r="58" fill="#2e2e2e" stroke="#555" stroke-width="1.2"/>

  <!-- D-pad directions -->
  <polygon id="btn-dpad-up"    points="340,496 329,514 351,514" fill="#444" stroke="#666" stroke-width="0.8" style="cursor:pointer"/>
  <polygon id="btn-dpad-down"  points="340,612 329,594 351,594" fill="#444" stroke="#666" stroke-width="0.8" style="cursor:pointer"/>
  <polygon id="btn-dpad-left"  points="282,554 300,543 300,565" fill="#444" stroke="#666" stroke-width="0.8" style="cursor:pointer"/>
  <polygon id="btn-dpad-right" points="398,554 380,543 380,565" fill="#444" stroke="#666" stroke-width="0.8" style="cursor:pointer"/>

  <!-- D-pad center -->
  <circle id="btn-dpad-center" cx="340" cy="554" r="20" fill="#3a3a3a" stroke="#777" stroke-width="1" style="cursor:pointer"/>
  <text x="340" y="559" text-anchor="middle" fill="#aaa" font-size="9" font-family="sans-serif">OK</text>

  <!-- Device back + home -->
  <rect id="btn-device-back" x="232" y="624" width="52" height="30" rx="6" ry="6"
        fill="#2e2e2e" stroke="#555" stroke-width="1" style="cursor:pointer"/>
  <text x="258" y="643" text-anchor="middle" fill="#aaa" font-size="10" font-family="sans-serif">back</text>
  <rect id="btn-device-home" x="396" y="624" width="52" height="30" rx="6" ry="6"
        fill="#2e2e2e" stroke="#555" stroke-width="1" style="cursor:pointer"/>
  <text x="422" y="643" text-anchor="middle" fill="#aaa" font-size="10" font-family="sans-serif">home</text>
  <text x="340" y="668" text-anchor="middle" fill="#383838" font-size="9" font-family="sans-serif">── device nav ──</text>

  <!-- Page/channel rocker -->
  <rect id="btn-pg-rocker-up"   x="232" y="682" width="32" height="44" rx="16" ry="16"
        fill="#2e2e2e" stroke="#666" stroke-width="1.2" style="cursor:pointer"/>
  <rect id="btn-pg-rocker-down" x="232" y="726" width="32" height="44" rx="16" ry="16"
        fill="#2e2e2e" stroke="#666" stroke-width="1.2" style="cursor:pointer"/>
  <line x1="234" y1="726" x2="262" y2="726" stroke="#555" stroke-width="0.8"/>
  <text x="248" y="710" text-anchor="middle" fill="#aaa" font-size="11" font-family="sans-serif">▲</text>
  <text x="248" y="742" text-anchor="middle" fill="#aaa" font-size="11" font-family="sans-serif">▼</text>
  <text x="248" y="782" text-anchor="middle" fill="#666" font-size="9" font-family="sans-serif">pg/ch</text>

  <!-- Play/pause -->
  <circle id="btn-play-pause" cx="340" cy="706" r="24"
          fill="#3a3a3a" stroke="#777" stroke-width="1.2" style="cursor:pointer"/>
  <polygon points="333,698 333,714 351,706" fill="#bbb"/>
  <rect x="353" y="699" width="4" height="14" rx="1" fill="#bbb"/>
  <rect x="360" y="699" width="4" height="14" rx="1" fill="#bbb"/>
  <text x="340" y="742" text-anchor="middle" fill="#666" font-size="9" font-family="sans-serif">play/pause</text>

  <!-- Mute -->
  <rect id="btn-mute" x="316" y="750" width="48" height="26" rx="6" ry="6"
        fill="#2e2e2e" stroke="#555" stroke-width="1" style="cursor:pointer"/>
  <text x="340" y="767" text-anchor="middle" fill="#aaa" font-size="10" font-family="sans-serif">mute</text>

  <!-- Volume rocker -->
  <rect id="btn-vol-up"   x="416" y="682" width="32" height="44" rx="16" ry="16"
        fill="#2e2e2e" stroke="#666" stroke-width="1.2" style="cursor:pointer"/>
  <rect id="btn-vol-down" x="416" y="726" width="32" height="44" rx="16" ry="16"
        fill="#2e2e2e" stroke="#666" stroke-width="1.2" style="cursor:pointer"/>
  <line x1="418" y1="726" x2="446" y2="726" stroke="#555" stroke-width="0.8"/>
  <text x="432" y="710" text-anchor="middle" fill="#aaa" font-size="13" font-family="sans-serif">+</text>
  <text x="432" y="742" text-anchor="middle" fill="#aaa" font-size="14" font-family="sans-serif">−</text>
  <text x="432" y="782" text-anchor="middle" fill="#666" font-size="9" font-family="sans-serif">vol</text>

  <!-- Programmable buttons (2x3 grid) -->
  <text x="340" y="800" text-anchor="middle" fill="#383838" font-size="9" font-family="sans-serif">── programmable ──</text>

  <rect id="btn-prog-1" x="247" y="810" width="52" height="38" rx="6" ry="6" fill="#2e2e2e" stroke="#4a4a4a" stroke-width="1" style="cursor:pointer"/>
  <text x="273" y="833" text-anchor="middle" fill="#777" font-size="9" font-family="sans-serif">1</text>

  <rect id="btn-prog-2" x="314" y="810" width="52" height="38" rx="6" ry="6" fill="#2e2e2e" stroke="#4a4a4a" stroke-width="1" style="cursor:pointer"/>
  <text x="340" y="833" text-anchor="middle" fill="#777" font-size="9" font-family="sans-serif">2</text>

  <rect id="btn-prog-3" x="381" y="810" width="52" height="38" rx="6" ry="6" fill="#2e2e2e" stroke="#4a4a4a" stroke-width="1" style="cursor:pointer"/>
  <text x="407" y="833" text-anchor="middle" fill="#777" font-size="9" font-family="sans-serif">3</text>

  <rect id="btn-prog-4" x="247" y="858" width="52" height="38" rx="6" ry="6" fill="#2e2e2e" stroke="#4a4a4a" stroke-width="1" style="cursor:pointer"/>
  <text x="273" y="881" text-anchor="middle" fill="#777" font-size="9" font-family="sans-serif">4</text>

  <rect id="btn-prog-5" x="314" y="858" width="52" height="38" rx="6" ry="6" fill="#2e2e2e" stroke="#4a4a4a" stroke-width="1" style="cursor:pointer"/>
  <text x="340" y="881" text-anchor="middle" fill="#777" font-size="9" font-family="sans-serif">5</text>

  <rect id="btn-prog-6" x="381" y="858" width="52" height="38" rx="6" ry="6" fill="#2e2e2e" stroke="#4a4a4a" stroke-width="1" style="cursor:pointer"/>
  <text x="407" y="881" text-anchor="middle" fill="#777" font-size="9" font-family="sans-serif">6</text>

</svg>
"""

